name: WebAct Universal Header Footer Audit

on:
  workflow_dispatch:

jobs:
  header-footer-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/audit/webact-header-footer-auditor.js .
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webact-header-footer-audit
          path: tools/audit/reports/header-footer/
