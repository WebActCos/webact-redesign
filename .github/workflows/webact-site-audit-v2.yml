name: WebAct Enterprise Site Audit v2

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  production-site-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run WebAct Enterprise Site Auditor v2
        run: node tools/audit/webact-site-auditor-v2.js .

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webact-enterprise-site-audit-v2
          path: |
            tools/audit/reports/v2/webact-enterprise-audit-v2.html
            tools/audit/reports/v2/webact-enterprise-audit-v2.json
            tools/audit/reports/v2/webact-enterprise-audit-v2.csv
