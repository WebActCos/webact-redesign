name: WebAct Enterprise Site Audit v4

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  enterprise-audit-v4:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run WebAct Enterprise Site Auditor v4
        run: node tools/audit/webact-site-auditor-v4.js .

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webact-enterprise-site-audit-v4
          path: |
            tools/audit/reports/v4/webact-enterprise-audit-v4.html
            tools/audit/reports/v4/webact-enterprise-audit-v4.json
            tools/audit/reports/v4/webact-enterprise-audit-v4.csv
