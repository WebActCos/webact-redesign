<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}} | WebAct</title>
  <meta name="description" content="Learn about {{title}} from WebAct, including website design, SEO, AEO, digital advertising, strategy, and online growth support.">
  <link rel="stylesheet" href="/assets/css/webact-promodo-nav.css?v=main-layout-1">
  <link rel="canonical" href="https://www.webact.com/assets/templates/landing-page.html">
  <meta property="og:title" content="{{title}} | WebAct">
  <meta property="og:description" content="Learn about {{title}} from WebAct, including website design, SEO, AEO, digital advertising, strategy, and online growth support.">
  <meta property="og:url" content="https://www.webact.com/assets/templates/landing-page.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{title}} | WebAct">
  <meta name="twitter:description" content="Learn about {{title}} from WebAct, including website design, SEO, AEO, digital advertising, strategy, and online growth support.">
  <meta name="robots" content="index,follow">
</head>
<body>
<div id="webact-header"></div>

  <main>
    <section class="wa-template-hero">
      <p class="wa-template-kicker">{{kicker}}</p>
      <h1>{{title}}</h1>
      <p>{{description}}</p>
    </section>

    <section class="wa-template-content">
      {{content}}
    </section>
  </main>

  <div id="webact-footer"></div>

  <script src="/assets/js/routes.js"></script>
  <script src="/assets/js/navigation.js"></script>
  <script src="/assets/js/includes.js"></script>

</body>
</html>
