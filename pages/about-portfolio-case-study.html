<style>
:root{--blue:#27a8e0;--blue-dark:#147eb1;--dark:#071927;--text:#4f6372;--muted:#6e7f8c;--line:#dfe8ef;--soft:#f5fafd;--white:#fff;--shadow:0 28px 80px rgba(7,25,39,.14);--soft-shadow:0 16px 48px rgba(7,25,39,.08)}
*{box-sizing:border-box}body{margin:0;background:#fff;color:var(--dark);font-family:Inter,Arial,Helvetica,sans-serif;overflow-x:hidden}a{color:inherit;text-decoration:none}
.breadcrumbs{max-width:1220px;margin:0 auto;padding:18px 22px 0;color:#6e7f8c;font-size:14px;font-weight:800}.breadcrumbs a{color:#0f7eb3}
.case-hero{background:radial-gradient(circle at 16% 22%,rgba(39,168,224,.18),transparent 30%),linear-gradient(180deg,#eef8fd 0%,#fff 100%);border-bottom:1px solid var(--line);overflow:hidden}.case-hero-inner{max-width:1220px;margin:0 auto;padding:58px 22px;display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,.64fr);gap:42px;align-items:center}
.eyebrow{margin:0 0 14px;color:var(--blue);font-weight:950;text-transform:uppercase;font-size:13px;letter-spacing:.09em}.case-hero h1{margin:0;font-size:clamp(44px,7vw,88px);line-height:.92;letter-spacing:-.05em}.case-hero p{margin:20px 0 0;max-width:780px;color:var(--text);font-size:20px;line-height:1.65}
.hero-actions{display:flex;gap:14px;flex-wrap:wrap;margin-top:30px}.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:14px 20px;font-weight:950;border:1px solid var(--dark);transition:transform .25s ease,box-shadow .25s ease}.btn:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(7,25,39,.16)}.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}.btn-secondary{background:#fff;color:var(--dark)}
.stats-panel{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:24px;padding:28px;box-shadow:var(--shadow)}.stats-panel h2{margin:0 0 18px;font-size:24px;letter-spacing:-.02em}.stat-list{display:grid;gap:16px}.stat{padding:16px;border-radius:16px;background:var(--soft);border:1px solid #e2edf4}.stat span{display:block;color:var(--muted);font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}.stat strong{display:block;font-size:18px;color:var(--dark)}
.case-main{max-width:1220px;margin:0 auto;padding:52px 22px 82px}.browser-showcase{border-radius:26px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);background:#edf5f9;margin-bottom:54px}.browser-bar{display:flex;align-items:center;gap:9px;padding:14px 18px;background:#e4edf3;border-bottom:1px solid #d5e2ea}.dot{width:12px;height:12px;border-radius:50%;display:inline-block}.dot.red{background:#ff5f56}.dot.yellow{background:#ffbd2e}.dot.green{background:#27c93f}.browser-url{margin-left:12px;color:#70818d;font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.device-tools{display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;margin:0 0 14px}.device-tools button{border:1px solid var(--dark);background:var(--dark);color:#fff;border-radius:999px;padding:10px 16px;font-weight:900;cursor:pointer}.hero-image{background:#fff;text-align:center}.hero-image img{display:block;width:100%;height:auto;cursor:zoom-in}
.case-grid{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:36px;align-items:start}.section-card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:32px;box-shadow:var(--soft-shadow);margin-bottom:24px}.section-card h2{margin:0 0 16px;font-size:34px;letter-spacing:-.035em}.section-card p{margin:0;color:var(--text);font-size:17px;line-height:1.75}
.split-blocks{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;margin-top:24px}.mini-block{background:var(--soft);border:1px solid #e1edf4;border-radius:18px;padding:22px}.mini-block strong{display:block;margin-bottom:8px;font-size:17px}.mini-block p{font-size:15px;line-height:1.62}
.service-grid,.feature-grid,.tech-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:18px}.service-card,.feature-card,.tech-card{padding:18px;border-radius:16px;background:var(--soft);border:1px solid #e1edf4;font-weight:900;color:var(--dark)}.service-card:before,.feature-card:before{content:"âœ“";display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;margin-right:9px;border-radius:50%;background:var(--blue);color:#fff;font-size:14px}.tech-card:before{content:"â€¢";display:inline-flex;margin-right:9px;color:var(--blue);font-size:22px;line-height:0}
.sidebar{position:sticky;top:24px}.sidebar-card{background:#071927;color:#fff;border-radius:24px;padding:28px;box-shadow:var(--shadow);margin-bottom:22px}.sidebar-card h3{margin:0 0 16px;font-size:25px;letter-spacing:-.025em}.sidebar-card p{margin:0 0 20px;color:#bfd2dd;line-height:1.65}.sidebar-card .btn{width:100%;background:var(--blue);border-color:var(--blue);color:#fff}.detail-list{display:grid;gap:14px;margin-top:20px}.detail{padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.14)}.detail:last-child{border-bottom:0;padding-bottom:0}.detail span{display:block;color:#91a9b7;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}.detail strong{display:block;font-size:17px}
.process-list{display:grid;gap:14px;margin-top:18px}.process-step{display:grid;grid-template-columns:42px 1fr;gap:14px;align-items:start}.process-step b{width:42px;height:42px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:#eaf7fd;color:var(--blue-dark);font-weight:950}.process-step strong{display:block;margin-bottom:5px}.process-step p{font-size:15px;line-height:1.6}
.related{margin-top:54px}.related h2{font-size:38px;margin:0 0 22px;letter-spacing:-.035em}.related-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:22px}.related-card{background:#fff;border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 14px 40px rgba(7,25,39,.08);transition:transform .3s ease,box-shadow .3s ease}.related-card:hover{transform:translateY(-6px);box-shadow:0 24px 60px rgba(7,25,39,.16)}.related-card img{width:100%;aspect-ratio:16/10;object-fit:cover;object-position:top center;background:#f2f6f8}.related-card div{padding:18px}.related-card span{display:inline-flex;margin-bottom:9px;color:var(--blue);font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:.08em}.related-card h3{margin:0;font-size:20px}
.case-nav{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-top:46px}.case-nav a{border:1px solid var(--line);border-radius:999px;padding:14px 18px;font-weight:900;background:#fff}.cta-band{margin-top:64px;background:radial-gradient(circle at 12% 25%,rgba(39,168,224,.28),transparent 32%),linear-gradient(135deg,#071927 0%,#0d344d 100%);color:#fff;border-radius:30px;padding:50px;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:24px;align-items:center;box-shadow:var(--shadow)}.cta-band h2{margin:0;font-size:clamp(34px,5vw,46px);line-height:1;letter-spacing:-.045em}.cta-band p{margin:12px 0 0;color:#c3d6e0;font-size:18px;line-height:1.6}.cta-band .btn{background:var(--blue);border-color:var(--blue);color:#fff}
.lightbox{position:fixed;inset:0;background:rgba(7,25,39,.92);display:none;align-items:center;justify-content:center;z-index:9999;padding:22px}.lightbox.is-open{display:flex}.lightbox img{max-width:96vw;max-height:92vh;object-fit:contain}.lightbox button{position:absolute;top:18px;right:18px;border:0;border-radius:999px;padding:12px 16px;font-weight:900;cursor:pointer}
.site-footer{border-top:1px solid var(--line);background:#071927;color:#fff;padding:32px 22px;text-align:center}.site-footer img{max-width:170px}.footer-links{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin-top:18px;font-weight:900}
.not-found{max-width:860px;margin:70px auto;padding:40px 22px;text-align:center}.not-found h1{font-size:48px;margin:0 0 12px}.not-found p{color:var(--text);font-size:18px;line-height:1.6}
@media(max-width:980px){.case-hero-inner,.case-grid,.cta-band{grid-template-columns:1fr}.sidebar{position:relative;top:auto}.related-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.split-blocks{grid-template-columns:1fr}}@media(max-width:640px){.case-hero-inner{padding-top:38px}.service-grid,.feature-grid,.tech-grid,.related-grid{grid-template-columns:1fr}.cta-band{padding:30px}.cta-band h2{font-size:32px}}

<div id="case-root"></div>

<script src="../script.js?v=reviews-layout-fix"></script>

<script src="../js/portfolio-data-all.js?v=full-250-case-screenshot-only-v1"></script>

<script src="./industry-overrides.js?v=screenshot-only-v1"></script>

<script>
(function(){
const fallback=window.webactPortfolioProjects||[];
const rows=window.webactPortfolioRows||[];
const master=window.webactPortfolioMaster||[];
const INDUSTRY_OVERRIDES=window.webactIndustryOverrides||{};
const NAME_OVERRIDES=window.webactPortfolioNameOverrides||{};
const PROJECT_OVERRIDES=window.webactPortfolioOverrides||{};
const FEATURED_PROJECTS=window.webactFeaturedProjects||[];

const slug=s=>String(s||'').toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const normalizeName=value=>String(value||'').replace(/&/g,'and').replace(/[^a-z0-9]+/gi,' ').trim().replace(/\s+/g,' ');
const lookupByName=(table,name)=>table[String(name||'')]||table[normalizeName(name)]||'';
const displayName=value=>(lookupByName(PROJECT_OVERRIDES,value).name)||lookupByName(NAME_OVERRIDES,value)||value||'';
const refineIndustry=(name,industry)=>(lookupByName(PROJECT_OVERRIDES,name).industry)||lookupByName(INDUSTRY_OVERRIDES,name)||industry||'Business';

const knownIndustries=['Restaurant','Pet Services','Home Care','Healthcare','Health Care','Driving School','HVAC','Plumbing','Pest Control','Locksmith','Roofing','Salon & Beauty','Automotive','Dental','Dentist','Legal','Electrical','Water Treatment','Printing & Graphics','Energy','Security','Travel','Retail','Real Estate','Education','Technology','Nonprofit','Non Profit','Professional Services','Home Services','Business','Ecommerce','Investors','Transportation','Artist','Wedding','Tattoo Shop','Phone Repair','Interior Design','Glass Repair','Construction','Community','Fair','Investigation','Fitness','Home Inspection','Design','Golf','Bookkeeping','Photography','Photographer','Portfolio'];
const legacySvc=i=>knownIndustries.includes(i)?['Website Design',i,'Local SEO']:['Website Design','Content','Lead Generation'];

function industryCTA(industry){
  const key=String(industry||'').toLowerCase();
  if(key.includes('dent'))return ['Build a Modern Dental Website','Help patients understand your services, trust your practice, and request an appointment with confidence.','Build a Dental Website'];
  if(key.includes('restaurant'))return ['Grow Your Restaurant Online','Showcase your menu, location, story, and ordering path with a restaurant website built for customers.','Grow Your Restaurant Online'];
  if(key.includes('roof'))return ['Generate More Roofing Leads','Create a roofing website that helps homeowners trust your company and request service faster.','Generate Roofing Leads'];
  if(key.includes('legal'))return ['Create a Law Firm Website','Present legal services with authority, clarity, and a professional path for new inquiries.','Create a Law Firm Website'];
  if(key.includes('photo'))return ['Showcase Your Portfolio','Build a visual portfolio website that presents your work clearly and helps clients reach out.','Showcase Your Portfolio'];
  if(key.includes('plumb'))return ['Generate More Plumbing Leads','Make urgent services easy to find and give visitors a clear path to request help.','Build a Plumbing Website'];
  if(key.includes('real estate'))return ['Create a Real Estate Website','Present properties, expertise, and local trust with a website built for buyer and seller inquiries.','Build a Real Estate Website'];
  if(key.includes('ecommerce')||key.includes('retail'))return ['Launch a Better Retail Website','Showcase products, offers, and next steps with a website designed for discovery and action.','Start a Retail Website'];
  return ['Get a Portfolio-Level Website','Use this case study as inspiration for a website that looks polished, loads well, and helps visitors take the next step.','Start Your Project'];
}

function makeDescription(p,index){
  const name=p.name||'this project';
  const industry=p.industry||'Business';
  const services=(p.services||[]).filter(Boolean);
  const serviceText=services.length?services.slice(0,2).join(' and '):'website design';
  const focus=['trust','clarity','local visibility','visitor confidence','lead generation','mobile usability','professional presentation','brand credibility','service discovery','conversion flow','customer education','online growth'][index%12];
  const variations=[
    name+' presents a '+industry.toLowerCase()+' website experience centered on '+focus+', simple navigation, and practical next steps for visitors.',
    'For '+name+', WebAct organized the message around '+serviceText.toLowerCase()+', helping visitors understand the business quickly and move toward contact.',
    'This '+industry.toLowerCase()+' example gives '+name+' a stronger digital presence with focused content, polished visuals, and a layout built for real customer action.',
    name+' uses a tailored page structure to explain services, support '+focus+', and make the business easier to evaluate on desktop and mobile.',
    'The '+name+' project shows how a '+industry.toLowerCase()+' brand can communicate value with cleaner content, stronger first impressions, and clear calls to action.',
    'WebAct shaped '+name+' around a more useful visitor journey, combining '+serviceText.toLowerCase()+' with design choices that support confidence and inquiries.',
    'This portfolio example highlights '+name+' with industry-specific messaging, organized service details, and a website presentation built to feel credible from the first visit.',
    name+' is designed to help visitors understand the offer, compare the business more easily, and take the next step without confusion.',
    'The website direction for '+name+' balances brand personality with practical conversion goals, giving the '+industry.toLowerCase()+' project a more complete online presence.',
    'For this '+industry.toLowerCase()+' case study, WebAct focused on making '+name+' easier to find, easier to understand, and easier to contact.',
    name+' demonstrates a cleaner approach to '+industry.toLowerCase()+' web design, using concise sections, relevant service language, and a layout that supports action.',
    'This project gives '+name+' a more polished online showcase while emphasizing '+focus+', customer understanding, and a smoother path to inquiry.'
  ];
  return variations[index%variations.length];
}

function makeSections(p,index){
  const name=p.name, industry=p.industry;
  return {
    overview:name+' needed a website presentation that matched the expectations of '+industry.toLowerCase()+' visitors while keeping the path from interest to contact simple. WebAct focused on organizing the content so prospects could quickly understand the business and move forward with confidence.',
    goals:'The main goal was to make '+name+' easier to understand, easier to evaluate, and easier to contact from any device.',
    experience:'Visitors are guided through the business story, service information, trust cues, and calls to action without unnecessary friction.',
    highlights:'The design uses visual hierarchy, responsive structure, concise copy, and focused calls to action to support a professional first impression.',
    challenges:'A '+industry.toLowerCase()+' website must answer questions quickly while giving visitors enough confidence to take the next step.',
    why:'This design works because it reduces confusion, supports credibility, and connects the visitor journey to practical business goals.',
    benefits:'The finished page gives '+name+' a stronger online foundation for search, advertising, referrals, and customer inquiries.'
  };
}

function normalizeProject(raw,index){
  const originalName=raw.name||'';
  const override=lookupByName(PROJECT_OVERRIDES,originalName)||{};
  const name=override.name||displayName(originalName);
  const industry=override.industry||refineIndustry(originalName,raw.industry);
  const services=raw.services&&raw.services.length?raw.services:legacySvc(industry);
  const desc=override.description||makeDescription({name,industry,services},index);
  return {
    ...raw,
    name,
    slug:raw.slug||slug(originalName),
    industry,
    image:raw.image||raw.img||'',
    services,
    features:raw.features&&raw.features.length?raw.features:['Mobile Responsive','Clear Calls To Action','Service-Focused Content','Fast Loading Pages','SEO-Friendly Structure'],
    technologies:raw.technologies&&raw.technologies.length?raw.technologies:['HTML5','CSS3','JavaScript','Responsive Design','Local SEO','Performance Optimization'],
    description:desc,
    seoTitle:override.seoTitle||raw.seoTitle||name+' Website Design Case Study | WebAct '+industry+' Portfolio',
    seoDescription:override.seoDescription||raw.seoDescription||'Explore the '+name+' case study from WebAct, including '+industry.toLowerCase()+' website strategy, services, features, and project details.',
    caseStudy:raw.caseStudy&&Object.keys(raw.caseStudy).length?raw.caseStudy:null,
    override
  };
}

const legacyProjects=rows.length?rows.map((r,index)=>normalizeProject({name:r[0],slug:slug(r[0]),industry:r[1],image:r[2],services:legacySvc(refineIndustry(r[0],r[1]))},index)):fallback.map((p,index)=>normalizeProject({name:p.name,slug:slug(p.name),industry:p.industry,image:p.img,services:p.services,description:p.desc},index));
const projects=master.length?master.map((p,index)=>normalizeProject(p,index)):legacyProjects;
const WEBTACT_TAG_COPY={
  "Ecommerce":["ecommerce website experience centered on product discovery, trust, simple navigation, and clear shopping paths for customers.","Grow Your Ecommerce Business Online","Showcase products, categories, promotions, brand story, and shopping paths with an ecommerce website built for customers."],
  "Restaurant":["restaurant website experience centered on menus, location details, trust, and practical next steps for visitors.","Grow Your Restaurant Online","Showcase your menu, location, story, and ordering path with a restaurant website built for customers."],
  "Dental":["dental website experience centered on patient trust, clear services, appointment paths, and local visibility.","Grow Your Dental Practice Online","Showcase services, providers, patient resources, location details, and appointment requests with a dental website built for patients."],
  "Healthcare":["healthcare website experience centered on trust, services, patient education, and simple appointment paths.","Grow Your Healthcare Practice Online","Showcase care services, providers, patient resources, locations, and appointment paths with a healthcare website built for patients."],
  "Home Services":["home services website experience centered on trust, service clarity, local proof, and quote-focused next steps.","Grow Your Home Services Business Online","Showcase services, service areas, reviews, project proof, and quote requests with a website built for local customers."],
  "Roofing":["roofing website experience centered on service clarity, trust, project credibility, and quote-focused next steps.","Grow Your Roofing Business Online","Showcase roofing services, service areas, reviews, project proof, and quote requests with a website built for local customers."],
  "HVAC":["HVAC website experience centered on emergency service visibility, trust, comfort solutions, and quote-focused next steps.","Grow Your HVAC Business Online","Showcase heating, cooling, indoor air quality, service areas, reviews, and appointment requests."],
  "Plumbing":["plumbing website experience centered on urgent service needs, trust, clear service categories, and easy contact paths.","Grow Your Plumbing Business Online","Showcase plumbing services, emergency support, service areas, reviews, and quote requests."],
  "Legal":["legal website experience centered on credibility, practice areas, trust, and consultation-focused next steps.","Grow Your Law Firm Online","Showcase practice areas, attorney credibility, client resources, and consultation paths."],
  "Real Estate":["real estate website experience centered on listings, local expertise, trust, and lead generation.","Grow Your Real Estate Business Online","Showcase properties, communities, agent expertise, and buyer or seller inquiry paths."],
  "Professional Services":["professional services website experience centered on expertise, trust, service clarity, and lead generation.","Grow Your Professional Services Business Online","Showcase services, expertise, proof, resources, and consultation paths."],
  "Pet Services":["pet services website experience centered on trust, care details, services, and easy booking paths.","Grow Your Pet Services Business Online","Showcase services, care details, reviews, locations, and booking requests."],
  "Automotive":["automotive website experience centered on services, inventory or repairs, trust, and appointment paths.","Grow Your Automotive Business Online","Showcase services, vehicles, specials, reviews, and appointment requests."],
  "Technology":["technology website experience centered on solutions, credibility, product clarity, and conversion paths.","Grow Your Technology Business Online","Showcase solutions, features, use cases, proof, and demo or contact paths."],
  "Nonprofit":["nonprofit website experience centered on mission, trust, community impact, and donation or volunteer paths.","Grow Your Nonprofit Online","Showcase your mission, programs, impact, events, donation paths, and volunteer opportunities."],
  "Business":["business website experience centered on trust, service clarity, brand story, and practical next steps for visitors.","Grow Your Business Online","Showcase your services, story, proof, and conversion paths with a website built for customers."]
};

function webactSlug(v){return String(v||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");}
function webactCaseCopy(tag,name){
  const row=WEBTACT_TAG_COPY[tag]||WEBTACT_TAG_COPY.Business;
  return {
    intro:name+" presents a "+row[0],
    heading:row[1],
    body:row[2]
  };
}

const webactPortfolioTagMap={};
try{
  (rows||[]).forEach(r=>{
    if(r&&r[0]&&r[1]) webactPortfolioTagMap[webactSlug(r[0])]=r[1];
  });
}catch(e){}

projects.forEach(p=>{
  const sourceTag=webactPortfolioTagMap[webactSlug(p.name)]||p.industry||p.category||"Business";
  p.industry=sourceTag;
  p.category=sourceTag;

  const copy=webactCaseCopy(sourceTag,p.name);
  p.description=copy.intro;
  p.seoDescription=copy.intro;
  p.seoTitle=p.name+" "+sourceTag+" Website Design Case Study | WebAct Portfolio";

  p.override=p.override||{};
  p.override.hero=copy.intro;
  p.override.cta={
    headline:copy.heading,
    text:copy.body,
    button:"Start a Similar Project"
  };
});

const params=new URLSearchParams(window.location.search);
const requested=params.get('project')||'';
let index=projects.findIndex(p=>p.slug===requested||slug(p.name)===requested);
if(index<0&&projects.length)index=0;
const root=document.getElementById('case-root');

function cardList(items,className){return (items||[]).map(item=>'<div class="'+className+'">'+esc(item)+'</div>').join('');}
function absoluteImage(path){return 'https://www.webact.com/'+String(path||'').replace('../../','');}
function score(a,b){
  let total=0;
  if(a.industry===b.industry)total+=10;
  if((b.override&&b.override.featured)||FEATURED_PROJECTS.includes(b.name)||FEATURED_PROJECTS.includes(normalizeName(b.name)))total+=2;
  (a.services||[]).forEach(x=>{if((b.services||[]).includes(x))total+=3;});
  (a.technologies||[]).forEach(x=>{if((b.technologies||[]).includes(x))total+=1;});
  return total;
}
function relatedCards(project){
  return projects.filter(p=>p.name!==project.name).map(p=>({project:p,score:score(project,p)})).sort((a,b)=>b.score-a.score).slice(0,3).map(item=>{
    const p=item.project;
    return '<a class="related-card" href="./case-study.html?project='+esc(p.slug)+'"><img src="'+esc(p.image)+'" alt="'+esc(p.name)+' website design screenshot" loading="lazy"><div><span>'+esc(p.industry)+'</span><h3>'+esc(p.name)+'</h3></div></a>';
  }).join('');
}
function updateHead(p){
  const title=p.seoTitle;
  const desc=p.seoDescription;
  const url='https://www.webact.com/about/portfolio/case-study.html?project='+p.slug;
  document.title=title;
  document.querySelector('meta[name="description"]').setAttribute('content',desc);
  document.querySelector('link[rel="canonical"]').setAttribute('href',url);
  document.querySelector('meta[property="og:title"]').setAttribute('content',title);
  document.querySelector('meta[property="og:description"]').setAttribute('content',desc);
  document.querySelector('meta[property="og:url"]').setAttribute('content',url);
  document.querySelector('meta[property="og:image"]').setAttribute('content',absoluteImage(p.image));
  document.querySelector('meta[name="twitter:title"]').setAttribute('content',title);
  document.querySelector('meta[name="twitter:description"]').setAttribute('content',desc);
  document.querySelector('meta[name="twitter:image"]').setAttribute('content',absoluteImage(p.image));
}
function addJsonLd(p){
  const old=document.getElementById('case-jsonld');if(old)old.remove();
  const data={"@context":"https://schema.org","@type":"CreativeWork","name":p.name+" Website Design Case Study","headline":p.seoTitle,"description":p.description,"image":absoluteImage(p.image),"url":"https://www.webact.com/about/portfolio/case-study.html?project="+p.slug,"creator":{"@type":"Organization","name":"WebAct","url":"https://www.webact.com/"},"about":{"@type":"Thing","name":p.industry+" Website Design"},"genre":"Website Design Portfolio","breadcrumb":{"@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Home","item":"https://www.webact.com/"},{"@type":"ListItem","position":2,"name":"Portfolio","item":"https://www.webact.com/about/portfolio/"},{"@type":"ListItem","position":3,"name":p.name,"item":"https://www.webact.com/about/portfolio/case-study.html?project="+p.slug}]}};
  const script=document.createElement('script');script.type='application/ld+json';script.id='case-jsonld';script.textContent=JSON.stringify(data);document.head.appendChild(script);
}
function renderNotFound(){root.innerHTML='<section class="not-found"><h1>Case study not found</h1><p>We could not find that portfolio project. Return to the portfolio to browse all WebAct website design case studies.</p><p><a class="btn btn-primary" href="./index.html">Back to Portfolio</a></p></section>';}
function render(){
  if(!projects.length){renderNotFound();return;}
  const p=projects[index], prev=projects[(index-1+projects.length)%projects.length], next=projects[(index+1)%projects.length];
  const related=relatedCards(p), sections=makeSections(p,index), cta=p.override.cta?[p.override.cta.headline,p.override.cta.text,p.override.cta.button]:industryCTA(p.industry);
  updateHead(p);addJsonLd(p);
  root.innerHTML=
    '<nav class="breadcrumbs"><a href="../index.html">Home</a> / <a href="./index.html">Top 250 Website Designs</a> / <span>'+esc(p.name)+'</span></nav>'+
    '<section class="case-hero"><div class="case-hero-inner"><div><p class="eyebrow">'+esc(p.industry)+' Website Design Case Study</p><h1>'+esc(p.name)+'</h1><p>'+esc(p.override.hero||p.description)+'</p><div class="hero-actions"><a class="btn btn-primary" href="/contact/index.html">'+esc(cta[2])+'</a><a class="btn btn-secondary" href="./index.html">Back to Top 250 Designs</a></div></div><aside class="stats-panel"><h2>Project Snapshot</h2><div class="stat-list"><div class="stat"><span>Industry</span><strong>'+esc(p.industry)+'</strong></div><div class="stat"><span>Services</span><strong>'+esc((p.services||[]).slice(0,4).join(', '))+'</strong></div><div class="stat"><span>Collection</span><strong>Top 250 Website Designs</strong></div></div></aside></div></section>'+
    '<main class="case-main"><div class="device-tools"><button type="button" id="open-lightbox">View Full Screenshot</button></div><div class="browser-showcase" id="device-preview"><div class="browser-bar"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span><span class="browser-url">'+esc(p.name)+' website design preview</span></div><div class="hero-image"><img id="main-shot" src="'+esc(p.image)+'" alt="'+esc(p.name)+' website design screenshot"></div></div>'+
    '<div class="case-grid"><section><article class="section-card"><h2>Business Overview</h2><p>'+esc(sections.overview)+'</p></article>'+
    '<article class="section-card"><h2>Website Goals</h2><p>'+esc(sections.goals)+'</p><div class="split-blocks"><div class="mini-block"><strong>Visitor Experience</strong><p>'+esc(sections.experience)+'</p></div><div class="mini-block"><strong>Design Highlights</strong><p>'+esc(sections.highlights)+'</p></div><div class="mini-block"><strong>Results & Benefits</strong><p>'+esc(sections.benefits)+'</p></div></div></article>'+
    '<article class="section-card"><h2>Industry Challenges</h2><p>'+esc(sections.challenges)+'</p><div class="split-blocks"><div class="mini-block"><strong>Why This Design Works</strong><p>'+esc(sections.why)+'</p></div><div class="mini-block"><strong>CTA Strategy</strong><p>'+esc(cta[1])+'</p></div><div class="mini-block"><strong>Growth Support</strong><p>Internal links, SEO-friendly structure, and clean content help this page support broader marketing goals.</p></div></div></article>'+
    '<article class="section-card"><h2>Services Used</h2><p>This project combines strategy, content, and website design tailored to the needs of a '+esc(p.industry)+' organization.</p><div class="service-grid">'+cardList(p.services,'service-card')+'</div></article>'+
    '<article class="section-card"><h2>Website Features</h2><p>Features were selected to make the experience easier to use, more credible, and more focused on customer action.</p><div class="feature-grid">'+cardList(p.features,'feature-card')+'</div></article>'+
    '<article class="section-card"><h2>Technology Stack</h2><p>The project is structured for performance, responsive presentation, discoverability, and long-term maintainability.</p><div class="tech-grid">'+cardList(p.technologies,'tech-card')+'</div></article></section>'+
    '<aside class="sidebar"><div class="sidebar-card"><h3>'+esc(cta[0])+'</h3><p>'+esc(cta[1])+'</p><a class="btn" href="/contact/index.html">'+esc(cta[2])+'</a><div class="detail-list"><div class="detail"><span>Company</span><strong>'+esc(p.name)+'</strong></div><div class="detail"><span>Industry</span><strong>'+esc(p.industry)+'</strong></div><div class="detail"><span>Portfolio Type</span><strong>Website Design Case Study</strong></div></div></div></aside></div>'+
    '<section class="related"><h2>Related Website Designs</h2><div class="related-grid">'+(related||'<p>No related projects found yet.</p>')+'</div></section>'+
    '<nav class="case-nav"><a href="./case-study.html?project='+esc(prev.slug)+'">? '+esc(prev.name)+'</a><a href="./index.html">Back to Portfolio</a><a href="./case-study.html?project='+esc(next.slug)+'">'+esc(next.name)+' ?’</a></nav>'+
    '<section class="cta-band"><div><h2>'+esc(cta[0])+'</h2><p>'+esc(cta[1])+'</p></div><a class="btn" href="/contact/index.html">'+esc(cta[2])+'</a></section></main>';
  wireInteractions(prev,next);
}
function wireInteractions(prev,next){
  const lightbox=document.getElementById('image-lightbox'), lightboxImg=document.getElementById('lightbox-image'), shot=document.getElementById('main-shot');
  function openLightbox(){lightboxImg.src=shot.src;lightboxImg.alt=shot.alt;lightbox.classList.add('is-open');}
  document.getElementById('open-lightbox').addEventListener('click',openLightbox);
  shot.addEventListener('click',openLightbox);
  document.getElementById('lightbox-close').addEventListener('click',()=>lightbox.classList.remove('is-open'));
  lightbox.addEventListener('click',e=>{if(e.target===lightbox)lightbox.classList.remove('is-open')});
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape')lightbox.classList.remove('is-open');
    if(e.key==='ArrowLeft')location.href='./case-study.html?project='+encodeURIComponent(prev.slug);
    if(e.key==='ArrowRight')location.href='./case-study.html?project='+encodeURIComponent(next.slug);
  });
}
render();
})();

<script>
document.addEventListener("DOMContentLoaded", function(){
  setTimeout(function(){
    const params = new URLSearchParams(location.search);
    const slug = (params.get("project") || "").toLowerCase();

    const projects = []
      .concat(window.webactPortfolioProjects || [])
      .concat(window.webactPortfolioMasterData || [])
      .concat(window.portfolioMasterData || []);

    const project = projects.find(function(item){
      const name = String(item.name || item.title || "").toLowerCase();
      const itemSlug = String(item.slug || name.replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")).toLowerCase();
      return itemSlug === slug || name.replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"") === slug;
    });

    const tag = window.webactGetPortfolioTag ? window.webactGetPortfolioTag(project) : "";
    if(!tag) return;

    document.querySelectorAll(
      "[data-industry], [data-category], .case-study-industry, .case-study-category, .portfolio-industry, .portfolio-category, .project-industry, .project-category"
    ).forEach(function(el){
      el.textContent = tag;
    });
  }, 250);
});
</script>
