<style>
:root{--blue:#27a8e0;--blue-dark:#147eb1;--dark:#071927;--text:#4f6372;--muted:#6e7f8c;--line:#dfe8ef;--soft:#f5fafd;--white:#fff;--shadow:0 28px 80px rgba(7,25,39,.14);--soft-shadow:0 16px 48px rgba(7,25,39,.08)}
*{box-sizing:border-box}
body{margin:0;background:#fff;color:var(--dark);font-family:Inter,Arial,Helvetica,sans-serif;overflow-x:hidden}
a{color:inherit;text-decoration:none}
.breadcrumbs{max-width:1220px;margin:0 auto;padding:18px 22px 0;color:#6e7f8c;font-size:14px;font-weight:800}
.breadcrumbs a{color:#0f7eb3}
.case-hero{background:radial-gradient(circle at 16% 22%,rgba(39,168,224,.18),transparent 30%),linear-gradient(180deg,#eef8fd 0%,#fff 100%);border-bottom:1px solid var(--line);overflow:hidden}
.case-hero-inner{max-width:1220px;margin:0 auto;padding:58px 22px 58px;display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,.64fr);gap:42px;align-items:center}
.eyebrow{margin:0 0 14px;color:var(--blue);font-weight:950;text-transform:uppercase;font-size:13px;letter-spacing:.09em}
.case-hero h1{margin:0;font-size:clamp(44px,7vw,88px);line-height:.92;letter-spacing:-.05em}
.case-hero p{margin:20px 0 0;max-width:780px;color:var(--text);font-size:20px;line-height:1.65}
.hero-actions{display:flex;gap:14px;flex-wrap:wrap;margin-top:30px}
.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:14px 20px;font-weight:950;border:1px solid var(--dark);transition:transform .25s ease,box-shadow .25s ease}
.btn:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(7,25,39,.16)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-secondary{background:#fff;color:var(--dark)}
.stats-panel{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:24px;padding:28px;box-shadow:var(--shadow)}
.stats-panel h2{margin:0 0 18px;font-size:24px;letter-spacing:-.02em}
.stat-list{display:grid;gap:16px}
.stat{padding:16px;border-radius:16px;background:var(--soft);border:1px solid #e2edf4}
.stat span{display:block;color:var(--muted);font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.stat strong{display:block;font-size:18px;color:var(--dark)}
.case-main{max-width:1220px;margin:0 auto;padding:52px 22px 82px}
.browser-showcase{border-radius:26px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);background:#edf5f9;margin-bottom:54px}
.browser-bar{display:flex;align-items:center;gap:9px;padding:14px 18px;background:#e4edf3;border-bottom:1px solid #d5e2ea}
.dot{width:12px;height:12px;border-radius:50%;display:inline-block}.dot.red{background:#ff5f56}.dot.yellow{background:#ffbd2e}.dot.green{background:#27c93f}
.browser-url{margin-left:12px;color:#70818d;font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hero-image{background:#fff}.hero-image img{display:block;width:100%;height:auto}
.case-grid{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:36px;align-items:start}
.section-card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:32px;box-shadow:var(--soft-shadow);margin-bottom:24px}
.section-card h2{margin:0 0 16px;font-size:34px;letter-spacing:-.035em}
.section-card p{margin:0;color:var(--text);font-size:17px;line-height:1.75}
.split-blocks{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;margin-top:24px}
.mini-block{background:var(--soft);border:1px solid #e1edf4;border-radius:18px;padding:22px}
.mini-block strong{display:block;margin-bottom:8px;font-size:17px}.mini-block p{font-size:15px;line-height:1.62}
.service-grid,.feature-grid,.tech-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:18px}
.service-card,.feature-card,.tech-card{padding:18px;border-radius:16px;background:var(--soft);border:1px solid #e1edf4;font-weight:900;color:var(--dark)}
.service-card:before,.feature-card:before{content:"✓";display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;margin-right:9px;border-radius:50%;background:var(--blue);color:#fff;font-size:14px}
.tech-card:before{content:"•";display:inline-flex;margin-right:9px;color:var(--blue);font-size:22px;line-height:0}
.sidebar{position:sticky;top:24px}
.sidebar-card{background:#071927;color:#fff;border-radius:24px;padding:28px;box-shadow:var(--shadow);margin-bottom:22px}
.sidebar-card h3{margin:0 0 16px;font-size:25px;letter-spacing:-.025em}.sidebar-card p{margin:0 0 20px;color:#bfd2dd;line-height:1.65}
.sidebar-card .btn{width:100%;background:var(--blue);border-color:var(--blue);color:#fff}
.detail-list{display:grid;gap:14px;margin-top:20px}.detail{padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.14)}
.detail:last-child{border-bottom:0;padding-bottom:0}.detail span{display:block;color:#91a9b7;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.detail strong{display:block;font-size:17px}
.process-list{display:grid;gap:14px;margin-top:18px}.process-step{display:grid;grid-template-columns:42px 1fr;gap:14px;align-items:start}
.process-step b{width:42px;height:42px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:#eaf7fd;color:var(--blue-dark);font-weight:950}
.process-step strong{display:block;margin-bottom:5px}.process-step p{font-size:15px;line-height:1.6}
.related{margin-top:54px}.related h2{font-size:38px;margin:0 0 22px;letter-spacing:-.035em}
.related-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:22px}
.related-card{background:#fff;border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 14px 40px rgba(7,25,39,.08);transition:transform .3s ease,box-shadow .3s ease}
.related-card:hover{transform:translateY(-6px);box-shadow:0 24px 60px rgba(7,25,39,.16)}
.related-card img{width:100%;aspect-ratio:16/10;object-fit:cover;object-position:top center;background:#f2f6f8}
.related-card div{padding:18px}.related-card span{display:inline-flex;margin-bottom:9px;color:var(--blue);font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:.08em}
.related-card h3{margin:0;font-size:20px}
.case-nav{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-top:46px}.case-nav a{border:1px solid var(--line);border-radius:999px;padding:14px 18px;font-weight:900;background:#fff}
.cta-band{margin-top:64px;background:radial-gradient(circle at 12% 25%,rgba(39,168,224,.28),transparent 32%),linear-gradient(135deg,#071927 0%,#0d344d 100%);color:#fff;border-radius:30px;padding:50px;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:24px;align-items:center;box-shadow:var(--shadow)}
.cta-band h2{margin:0;font-size:clamp(34px,5vw,46px);line-height:1;letter-spacing:-.045em}.cta-band p{margin:12px 0 0;color:#c3d6e0;font-size:18px;line-height:1.6}
.cta-band .btn{background:var(--blue);border-color:var(--blue);color:#fff}
.site-footer{border-top:1px solid var(--line);background:#071927;color:#fff;padding:32px 22px;text-align:center}.site-footer img{max-width:170px}
.footer-links{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin-top:18px;font-weight:900}
.not-found{max-width:860px;margin:70px auto;padding:40px 22px;text-align:center}.not-found h1{font-size:48px;margin:0 0 12px}.not-found p{color:var(--text);font-size:18px;line-height:1.6}
@media(max-width:980px){.case-hero-inner,.case-grid,.cta-band{grid-template-columns:1fr}.sidebar{position:relative;top:auto}.related-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.split-blocks{grid-template-columns:1fr}}
@media(max-width:640px){.case-hero-inner{padding-top:38px}.service-grid,.feature-grid,.tech-grid,.related-grid{grid-template-columns:1fr}.cta-band{padding:30px}.cta-band h2{font-size:32px}}
</style>
</head>
<body>
<header class="wa-promodo-header" data-wa-nav><nav class="wa-promodo-nav" aria-label="Main navigation"><a class="wa-promodo-logo" href="../../index.html" aria-label="WebAct home"><img src="../../assets/images/webact-logo.png" alt="WebAct"></a><ul class="wa-promodo-menu" data-wa-menu><li class="wa-promodo-item"><a class="wa-promodo-direct" href="../../design/website-design/index.html">Website Design</a></li><li class="wa-promodo-item"><a class="wa-promodo-direct" href="../../digital-ads/index.html">Digital Ads</a></li><li class="wa-promodo-item"><a class="wa-promodo-direct" href="../../marketing/index.html">Marketing</a></li><li class="wa-promodo-item"><a class="wa-promodo-direct" href="../../industries/index.html">Industries</a></li><li class="wa-promodo-item"><a class="wa-promodo-direct" href="../../pricing/index.html">Pricing</a></li><li class="wa-promodo-item"><a class="wa-promodo-direct" href="../../contact/index.html">Contact Us</a></li></ul><div class="wa-promodo-actions"><a class="wa-promodo-cta" href="../../contact/index.html">Get Started</a><button class="wa-promodo-toggle" type="button" aria-label="Open navigation" aria-expanded="false" data-wa-menu-toggle><span></span></button></div></nav></header>
<div id="case-root"></div>
<footer class="site-footer"><img src="../../assets/logo.png" alt="WebAct"><p>Website design, advertising, marketing, widgets, domains, and email for small and medium-sized businesses.</p><div class="footer-links"><a href="../../design/index.html">Design</a><a href="../../digital-ads/index.html">Digital Ads</a><a href="../../marketing/index.html">Marketing</a><a href="../../pricing/index.html">Pricing</a><a href="../../addons/index.html">Add-ons</a></div></footer>

<script src="./portfolio-data-all.js?v=full-250-case-premium-v2"></script>
<script src="./industry-overrides.js?v=3"></script>
<script src="./portfolio-master-data.js?v=master-data-case-premium-v2"></script>
<script>
(function(){
const fallback=window.webactPortfolioProjects||[];
const rows=window.webactPortfolioRows||[];
const master=window.webactPortfolioMaster||[];
const INDUSTRY_OVERRIDES=window.webactIndustryOverrides||{};
const NAME_OVERRIDES=window.webactPortfolioNameOverrides||{};
const FEATURED_PROJECTS=window.webactFeaturedProjects||[];

const slug=s=>String(s||'').toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const normalizeName=value=>String(value||'').replace(/&/g,'and').replace(/[^a-z0-9]+/gi,' ').trim().replace(/\s+/g,' ');
const lookupByName=(table,name)=>table[String(name||'')]||table[normalizeName(name)]||'';
const displayName=value=>lookupByName(NAME_OVERRIDES,value)||value||'';
const refineIndustry=(name,industry)=>lookupByName(INDUSTRY_OVERRIDES,name)||industry||'Business';

const knownIndustries=['Restaurant','Pet Services','Home Care','Healthcare','Health Care','Driving School','HVAC','Plumbing','Pest Control','Locksmith','Roofing','Salon & Beauty','Automotive','Dental','Dentist','Legal','Electrical','Water Treatment','Printing & Graphics','Energy','Security','Travel','Retail','Real Estate','Education','Technology','Nonprofit','Non Profit','Professional Services','Home Services','Business','Ecommerce','Investors','Transportation','Artist','Wedding','Tattoo Shop','Phone Repair','Interior Design','Glass Repair','Construction','Community','Fair','Investigation','Fitness','Home Inspection','Design','Golf','Bookkeeping','Photography','Photographer','Portfolio'];
const legacySvc=i=>knownIndustries.includes(i)?['Website Design',i,'Local SEO']:['Website Design','Content','Lead Generation'];

function makeDescription(p,index){
  const name=p.name||'this project';
  const industry=p.industry||'Business';
  const services=(p.services||[]).filter(Boolean);
  const serviceText=services.length?services.slice(0,2).join(' and '):'website design';
  const focus=['trust','clarity','local visibility','visitor confidence','lead generation','mobile usability','professional presentation','brand credibility','service discovery','conversion flow','customer education','online growth'][index%12];
  const variations=[
    name+' presents a '+industry.toLowerCase()+' website experience centered on '+focus+', simple navigation, and practical next steps for visitors.',
    'For '+name+', WebAct organized the message around '+serviceText.toLowerCase()+', helping visitors understand the business quickly and move toward contact.',
    'This '+industry.toLowerCase()+' example gives '+name+' a stronger digital presence with focused content, polished visuals, and a layout built for real customer action.',
    name+' uses a tailored page structure to explain services, support '+focus+', and make the business easier to evaluate on desktop and mobile.',
    'The '+name+' project shows how a '+industry.toLowerCase()+' brand can communicate value with cleaner content, stronger first impressions, and clear calls to action.',
    'WebAct shaped '+name+' around a more useful visitor journey, combining '+serviceText.toLowerCase()+' with design choices that support confidence and inquiries.',
    'This portfolio example highlights '+name+' with industry-specific messaging, organized service details, and a website presentation built to feel credible from the first visit.',
    name+' is designed to help visitors understand the offer, compare the business more easily, and take the next step without confusion.',
    'The website direction for '+name+' balances brand personality with practical conversion goals, giving the '+industry.toLowerCase()+' project a more complete online presence.',
    'For this '+industry.toLowerCase()+' case study, WebAct focused on making '+name+' easier to find, easier to understand, and easier to contact.',
    name+' demonstrates a cleaner approach to '+industry.toLowerCase()+' web design, using concise sections, relevant service language, and a layout that supports action.',
    'This project gives '+name+' a more polished online showcase while emphasizing '+focus+', customer understanding, and a smoother path to inquiry.'
  ];
  return variations[index%variations.length];
}

function makeCaseStudy(p,index){
  const name=p.name;
  const industry=p.industry;
  const goalWords=['increase visitor confidence','clarify the service offering','make the next step obvious','create a stronger first impression','support more qualified inquiries','make the brand easier to understand'];
  const goal=goalWords[index%goalWords.length];
  return {
    overview: name+' needed a website presentation that matched the expectations of '+industry.toLowerCase()+' visitors while keeping the path from interest to contact simple. WebAct focused on '+goal+', organizing the content so prospects could quickly understand the business and move forward with confidence.',
    challenge: 'The project needed to turn scattered information into a clear story for visitors who may be comparing options, checking credibility, or deciding whether to reach out.',
    solution: 'WebAct used a cleaner layout, stronger hierarchy, service-focused messaging, responsive design, and conversion-oriented sections to help the website communicate value quickly.',
    result: 'The finished case study gives '+name+' a more polished digital presence, clearer industry positioning, and a stronger foundation for search visibility, advertising, and customer inquiries.'
  };
}

function makeCTA(p,index){
  const industry=p.industry||'business';
  const ctas=[
    ['Build a Website Like This','Let WebAct create a professional '+industry.toLowerCase()+' website that makes your business easier to trust, understand, and contact.','Start a Similar Project'],
    ['Ready for a Better Website?','Turn your online presence into a stronger sales and marketing asset with design, content, SEO, and support from WebAct.','Request a Quote'],
    ['Make Your Website Work Harder','If your current website is outdated or unclear, WebAct can help create a cleaner experience built around real customer action.','Talk With WebAct'],
    ['Launch Something Stronger','Bring your services, visuals, and calls to action together in a website designed to support growth.','Start Your Project'],
    ['Get a Portfolio-Level Website','Use this case study as inspiration for a website that looks polished, loads well, and helps visitors take the next step.','Get Started']
  ];
  return ctas[index%ctas.length];
}

function processSteps(p,index){
  const industry=p.industry||'business';
  const options=[
    ['Positioning','Clarified how the '+industry.toLowerCase()+' offering should be presented to first-time visitors.'],
    ['Structure','Organized the website around the most important details customers need before reaching out.'],
    ['Conversion','Placed calls to action and trust signals where they support the visitor journey.'],
    ['Responsive Design','Shaped the page experience for desktop, tablet, and mobile visitors.']
  ];
  return options;
}

const legacyProjects=rows.length?rows.map((r,index)=>{
  const name=displayName(r[0]);
  const industry=refineIndustry(r[0],r[1]);
  const services=legacySvc(industry);
  return {
    name,
    slug:slug(r[0]),
    industry,
    image:r[2],
    previewUrl:r[3],
    liveUrl:'',
    services,
    features:['Mobile Responsive','Clear Calls To Action','Service-Focused Content','Fast Loading Pages','SEO-Friendly Structure'],
    technologies:['HTML5','CSS3','JavaScript','Responsive Design','Local SEO','Performance Optimization'],
    description:makeDescription({name,industry,services},index),
    seoTitle:name+' Website Design Case Study | WebAct '+industry+' Portfolio',
    seoDescription:'See how WebAct presented '+name+' with a '+industry.toLowerCase()+' website case study focused on clarity, trust, and customer action.',
    caseStudy:{}
  };
}):fallback.map((p,index)=>{
  const name=displayName(p.name);
  const industry=refineIndustry(p.name,p.industry);
  const services=p.services&&p.services.length?p.services:legacySvc(industry);
  return {name,slug:slug(p.name),industry,image:p.img,services,features:[],technologies:[],description:p.desc||makeDescription({name,industry,services},index),caseStudy:{}};
});

const projects=(master.length?master.map((p,index)=>{
  const name=displayName(p.name);
  const industry=refineIndustry(p.name,p.industry);
  const services=p.services&&p.services.length?p.services:legacySvc(industry);
  return {
    ...p,
    name,
    slug:p.slug||slug(p.name),
    industry,
    image:p.image,
    services,
    features:p.features&&p.features.length?p.features:['Mobile Responsive','Clear Calls To Action','Service-Focused Content','Fast Loading Pages','SEO-Friendly Structure'],
    technologies:p.technologies&&p.technologies.length?p.technologies:['HTML5','CSS3','JavaScript','Responsive Design','Local SEO','Performance Optimization'],
    description:(!p.description||/website design case study for/i.test(p.description))?makeDescription({name,industry,services},index):p.description,
    seoTitle:name+' Website Design Case Study | WebAct '+industry+' Portfolio',
    seoDescription:'Explore the '+name+' case study from WebAct, including '+industry.toLowerCase()+' website strategy, services, features, and project details.',
    caseStudy:p.caseStudy&&Object.keys(p.caseStudy).length?p.caseStudy:makeCaseStudy({name,industry},index)
  };
}):legacyProjects);

const params=new URLSearchParams(window.location.search);
const requested=params.get('project')||'';
let index=projects.findIndex(p=>p.slug===requested || slug(p.name)===requested);
if(index<0 && projects.length) index=0;
const root=document.getElementById('case-root');

function cardList(items,className){return (items||[]).map(item=>'<div class="'+className+'">'+esc(item)+'</div>').join('');}
function absoluteImage(path){return 'https://www.webact.com/'+String(path||'').replace('../../','');}
function score(a,b){
  let total=0;
  if(a.industry===b.industry)total+=10;
  if(FEATURED_PROJECTS.includes(b.name)||FEATURED_PROJECTS.includes(normalizeName(b.name)))total+=2;
  (a.services||[]).forEach(x=>{if((b.services||[]).includes(x))total+=3;});
  (a.features||[]).forEach(x=>{if((b.features||[]).includes(x))total+=1;});
  return total;
}
function relatedCards(project){
  return projects.filter(p=>p.name!==project.name).map(p=>({project:p,score:score(project,p)})).sort((a,b)=>b.score-a.score).slice(0,3).map(item=>{
    const p=item.project;
    return '<a class="related-card" href="./case-study.html?project='+esc(p.slug)+'"><img src="'+esc(p.image)+'" alt="'+esc(p.name)+' website design screenshot" loading="lazy"><div><span>'+esc(p.industry)+'</span><h3>'+esc(p.name)+'</h3></div></a>';
  }).join('');
}
function updateHead(p){
  const title=p.seoTitle||p.name+' Website Design Case Study | WebAct Portfolio';
  const desc=p.seoDescription||p.description||'Explore this WebAct website design case study.';
  const url='https://www.webact.com/about/portfolio/case-study.html?project='+p.slug;
  document.title=title;
  document.querySelector('meta[name="description"]').setAttribute('content',desc);
  document.querySelector('link[rel="canonical"]').setAttribute('href',url);
  document.querySelector('meta[property="og:title"]').setAttribute('content',title);
  document.querySelector('meta[property="og:description"]').setAttribute('content',desc);
  document.querySelector('meta[property="og:url"]').setAttribute('content',url);
  document.querySelector('meta[property="og:image"]').setAttribute('content',absoluteImage(p.image));
  document.querySelector('meta[name="twitter:title"]').setAttribute('content',title);
  document.querySelector('meta[name="twitter:description"]').setAttribute('content',desc);
  document.querySelector('meta[name="twitter:image"]').setAttribute('content',absoluteImage(p.image));
}
function addJsonLd(p){
  const old=document.getElementById('case-jsonld');if(old)old.remove();
  const data={"@context":"https://schema.org","@type":"CreativeWork","name":p.name+" Website Design Case Study","headline":p.seoTitle,"description":p.description,"image":absoluteImage(p.image),"url":"https://www.webact.com/about/portfolio/case-study.html?project="+p.slug,"creator":{"@type":"Organization","name":"WebAct","url":"https://www.webact.com/"},"about":{"@type":"Thing","name":p.industry+" Website Design"},"genre":"Website Design Portfolio","breadcrumb":{"@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Home","item":"https://www.webact.com/"},{"@type":"ListItem","position":2,"name":"Portfolio","item":"https://www.webact.com/about/portfolio/"},{"@type":"ListItem","position":3,"name":p.name,"item":"https://www.webact.com/about/portfolio/case-study.html?project="+p.slug}]}};
  const script=document.createElement('script');script.type='application/ld+json';script.id='case-jsonld';script.textContent=JSON.stringify(data);document.head.appendChild(script);
}
function renderNotFound(){root.innerHTML='<section class="not-found"><h1>Case study not found</h1><p>We could not find that portfolio project. Return to the portfolio to browse all WebAct website design case studies.</p><p><a class="btn btn-primary" href="./index.html">Back to Portfolio</a></p></section>';}
function render(){
  if(!projects.length){renderNotFound();return;}
  const p=projects[index];
