d h3{margin:0 0 16px;font-size:24px}.sidebar-card p{margin:0 0 20px;color:#bfd2dd;line-height:1.65}.sidebar-card .btn{width:100%;background:var(--blue);border-color:var(--blue);color:#fff}.detail-list{display:grid;gap:14px;margin-top:20px}.detail{padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.14)}.detail:last-child{border-bottom:0;padding-bottom:0}.detail span{display:block;color:#91a9b7;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}.detail strong{display:block;font-size:17px}.related{margin-top:54px}.related h2{font-size:38px;margin:0 0 22px;letter-spacing:-.03em}.related-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:22px}.related-card{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 14px 40px rgba(7,25,39,.08);transition:transform .3s ease,box-shadow .3s ease}.related-card:hover{transform:translateY(-6px);box-shadow:0 24px 60px rgba(7,25,39,.16)}.related-card img{width:100%;aspect-ratio:16/10;object-fit:cover;background:#f2f6f8}.related-card div{padding:18px}.related-card span{display:inline-flex;margin-bottom:9px;color:var(--blue);font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:.08em}.related-card h3{margin:0;font-size:20px}.case-nav{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-top:46px}.case-nav a{border:1px solid var(--line);border-radius:999px;padding:14px 18px;font-weight:900;background:#fff}.cta-band{margin-top:64px;background:linear-gradient(135deg,#071927 0%,#0d344d 100%);color:#fff;border-radius:28px;padding:48px;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:24px;align-items:center;box-shadow:var(--shadow)}.cta-band h2{margin:0;font-size:42px;letter-spacing:-.04em}.cta-band p{margin:12px 0 0;color:#c3d6e0;font-size:18px;line-height:1.6}.cta-band .btn{background:var(--blue);border-color:var(--blue);color:#fff}.site-footer{border-top:1px solid var(--line);background: <script>
(function(){
const fallback=window.webactPortfolioProjects||[];const rows=window.webactPortfolioRows||[];const master=window.webactPortfolioMaster||[];
const slug=s=>String(s||'').toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const legacySvc=i=>['Restaurant','Pet Services','Home Care','Healthcare','Driving School','HVAC','Plumbing','Pest Control','Locksmith','Roofing','Salon & Beauty','Automotive','Dental','Legal','Electrical','Water Treatment','Printing & Graphics','Energy','Security','Travel','Retail','Real Estate'].includes(i)?['Website Design',i,'Local SEO']:['Website Design','Content','Lead Generation'];
const legacyProjects=rows.length?rows.map(r=>({name:r[0],slug:slug(r[0]),industry:r[1],image:r[2],previewUrl:r[3],liveUrl:'',services:legacySvc(r[1]),features:['Mobile Responsive','Fast Loading Pages','Clear Calls To Action','Contact Forms','SEO-Friendly Structure'],technologies:['HTML5','CSS3','JavaScript','Responsive Design','Local SEO','Performance Optimization'],description:r[1]+' website design case study for '+r[0]+', focused on clear messaging, professional presentation, visitor trust, and customer inquiry paths.',seoTitle:r[0]+' Website Design Case Study | WebAct Portfolio',seoDescription:'Explore the '+r[0]+' website design case study from WebAct.',caseStudy:{}})):fallback.map(p=>({name:p.name,slug:slug(p.name),industry:p.industry,image:p.img,services:p.services||[],features:[],technologies:[],description:p.desc||'',caseStudy:{}}));
const projects=master.length?master:legacyProjects;const params=new URLSearchParams(window.location.search);const requested=params.get('project')||'';let index=projects.findIndex(p=>p.slug===requested || slug(p.name)===requested);if(index<0 && projects.length) index=0;const root=document.getElementById('case-root');
function cardList(items,className){return (items||[]).map(item=>'<div class="'+className+'">'+esc(item)+'</div>').join('');}
function absoluteImage(path){return 'https://www.webact.com/'+String(path||'').replace('../../','');}
function score(a,b){let total=0;if(a.industry===b.industry) total+=8;(a.services||[]).forEach(x=>{if((b.services||[]).includes(x)) total+=3;});(a.features||[]).forEach(x=>{if((b.features||[]).includes(x)) total+=1;});(a.technologies||[]).forEach(x=>{if((b.technologies||[]).includes(x)) total+=1;});return total;}
function relatedCards(project){return projects.filter(p=>p.name!==project.name).map(p=>({project:p,score:score(project,p)})).sort((a,b)=>b.score-a.score).slice(0,3).map(item=>{const p=item.project;return '<a class="related-card" href="./case-study.html?project='+esc(p.slug)+'"><img src="'+esc(p.image)+'" alt="'+esc(p.name)+' website design screenshot" loading="lazy"><div><span>'+esc(p.industry)+'</span><h3>'+esc(p.name)+'</h3></div></a>';}).join('');}
function updateHead(p){const title=p.seoTitle||p.name+' Website Design Case Study | WebAct Portfolio';const desc=p.seoDescription||p.description||'Explore this WebAct website design case study.';const url='https://www.webact.com/about/portfolio/case-study.html?project='+p.slug;document.title=title;document.querySelector('meta[name="description"]').setAttribute('content',desc);document.querySelector('link[rel="canonical"]').setAttribute('href',url);document.querySelector('meta[property="og:title"]').setAttribute('content',title);document.querySelector('meta[property="og:description"]').setAttribute('content',desc);document.querySelector('meta[property="og:url"]').setAttribute('content',url);document.querySelector('meta[property="og:image"]').setAttribute('content',absoluteImage(p.image));}
function addJsonLd(p){const old=document.getElementById('case-jsonld');if(old) old.remove();const data={"@context":"https://schema.org","@type":"CreativeWork","name":p.name+" Website Design Case Study","description":p.description,"image":absoluteImage(p.image),"url":"https://www.webact.com/about/portfolio/case-study.html?project="+p.slug,"creator":{"@type":"Organization","name":"WebAct","url":"https://www.webact.com/"},"about":{"@type":"Thing","name":p.industry+" Website Design"},"breadcrumb":{"@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Home","item":"https://www.webact.com/"},{"@type":"ListItem","position":2,"name":"Portfolio","item":"https://www.webact.com/about/portfolio/"},{"@type":"ListItem","position":3,"name":p.name,"item":"https://www.webact.com/about/portfolio/case-study.html?project="+p.slug}]}};const script=document.createElement('script');script.type='application/ld+json';script.id='case-jsonld';script.textContent=JSON.stringify(data);document.head.appendChild(script);}
function renderNotFound(){root.innerHTML='<section class="not-found"><h1>Case study not found</h1><p>We could not find that portfolio project. Return to the portfolio to browse all WebAct website design case studies.</p><p><a class="btn btn-primary" href="./index.html">Back to Portfolio</a></p></section>';}
function render(){if(!projects.length){renderNotFound();return;}const p=projects[index];const prev=projects[(index-1+projects.length)%projects.length];const next=projects[(index+1)%projects.length];const related=relatedCards(p);const study=p.caseStudy||{};updateHead(p);addJsonLd(p);root.innerHTML='<nav class="breadcrumbs"><a href="../../index.html">Home</a> / <a href="./index.html">Top 250 Website Designs</a> / <span>'+esc(p.name)+'</span></nav>'+'<section class="case-hero"><div class="case-hero-inner"><div><p class="eyebrow">Top 250 Website Designs</p><h1>'+esc(p.name)+'</h1><p>'+esc(p.description||'WebAct website design portfolio project.')+'</p><div class="hero-actions"><a class="btn btn-primary" href="../../contact/index.html">Start a Similar Project</a><a class="btn btn-secondary" href="./index.html">Back to Portfolio</a></div></div><aside class="stats-panel"><h2>Project Snapshot</h2><div class="stat-list"><div class="stat"><span>Industry</span><strong>'+esc(p.industry)+'</strong></div><div class="stat"><span>Services</span><strong>'+esc((p.services||[]).join(', '))+'</strong></div><div class="stat"><span>Portfolio Type</span><strong>Top 250 Website Design</strong></div></div></aside></div></section>'+'<main class="case-main"><div class="browser-showcase"><div class="browser-bar"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span><span class="browser-url">webact portfolio showcase</span></div><div class="hero-image"><img src="'+esc(p.image)+'" alt="'+esc(p.name)+' website design screenshot"></div></div>'+'<div class="case-grid"><section><article class="section-card"><h2>About This Project</h2><p>'+esc(study.overview||'WebAct created a professional website presence for '+p.name+', helping the business present its services clearly and build trust with visitors.')+'</p><div class="split-blocks"><div class="mini-block"><strong>Challenge</strong><p>'+esc(study.challenge||'Present the business clearly, build trust quickly, and guide visitors toward action.')+'</p></div><div class="mini-block"><strong>Solution</strong><p>'+esc(study.solution||'Use polished design, structured content, mobile-friendly presentation, and clear conversion paths.')+'</p></div><div class="mini-block"><strong>Outcome</strong><p>'+esc(study.result||'A stronger online showcase that supports customer confidence and lead generation.')+'</p></div></div></article>'+'<article class="section-card"><h2>Services Used</h2><p>This project combines strategy, content, and website design tailored to the needs of a '+esc(p.industry)+' business.</p><div class="service-grid">'+cardList(p.services,'service-card')+'</div></article>'+'<article class="section-card"><h2>Website Features</h2><p>Each feature is selected to help visitors understand the business, build trust, and take action.</p><div class="feature-grid">'+cardList(p.features,'feature-card')+'</div></article>'+'<article class="section-card"><h2>Technology Stack</h2><p>The project is structured for performance, responsive presentation, discoverability, and long-term maintainability.</p><div class="tech-grid">'+cardList(p.technologies,'tech-card')+'</div></article></section>'+'<aside class="sidebar"><div class="sidebar-card"><h3>Need a website like this?</h3><p>WebAct can help build a professional website for your business with design, content, local SEO, advertising, domains, email, hosting, and ongoing support.</p><a class="btn" href="../../contact/index.html">Get Started</a><div class="detail-list"><div class="detail"><span>Company</span><strong>'+esc(p.name)+'</strong></div><div class="detail"><span>Industry</span><strong>'+esc(p.industry)+'</strong></div><div class="detail"><span>Collection</span><strong>Top 250 Website Designs</strong></div></div></div></aside></div>'+'<section class="related"><h2>You May Also Like</h2><div class="related-grid">'+(related||'<p>No related projects found yet.</p>')+'</div></section>'+'<nav class="case-nav"><a href="./case-study.html?project='+esc(prev.slug)+'">← '+esc(prev.name)+'</a><a href="./index.html">Back to Portfolio</a><a href="./case-study.html?project='+esc(next.slug)+'">'+esc(next.name)+' →</a></nav>'+'<section class="cta-band"><div><h2>Ready to build something better?</h2><p>Start your website design project with WebAct and get a professional online presence built to support your business goals.</p></div><a class="btn" href="../../contact/index.html">Start Your Project</a></section></main>';}
render();
})();
</script>
