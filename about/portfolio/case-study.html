      { title: headingSet[1], text: "Content is written around the priorities of a " + industryLower + " business, including " + profile.priority + "." },
      { title: headingSet[2], text: "The layout adapts across desktop, tablet, and mobile so customers can research " + name + " from any device." },
      { title: headingSet[3], text: "Calls to action guide visitors to " + profile.action + " without making the experience feel crowded or confusing." },
      { title: headingSet[4], text: "Professional imagery, hierarchy, and brand consistency help " + name + " establish credibility with prospective customers." },
      { title: headingSet[5], text: "The structure can grow with additional services, locations, campaigns, resources, or industry-specific landing pages." }
    ];

    var seoCards = [
      { title: industry + " Search Relevance", text: name + " is connected with language customers use when researching " + profile.search + "." },
      { title: "Business and Service Signals", text: "Headings, page copy, image descriptions, and internal links reinforce what " + name + " provides and who it serves." },
      { title: "Qualified Search Intent", text: "The content supports visitors who are ready to compare options, learn more, and " + profile.action + "." }
    ];

    var marketingCards = [
      { title: "Targeted Search Campaigns", text: name + " can use paid search to reach people actively looking for " + profile.search + "." },
      { title: industry + " Landing Pages", text: "Focused pages can promote specific services, programs, products, offers, locations, or seasonal priorities for " + name + "." },
      { title: "Ongoing Visibility", text: "SEO content, reviews, local listings, social campaigns, and remarketing can keep " + name + " visible throughout the customer journey." }
    ];

    var resultCards = [
      { title: "Stronger " + industry + " Positioning", text: name + " is presented with language and visuals that better match its market and intended audience." },
      { title: "Clearer Customer Decisions", text: "Visitors can understand the business, review relevant information, and decide whether " + name + " fits their needs." },
      { title: "More Useful Next Steps", text: "The experience makes it easier for customers to " + profile.action + ", supporting more meaningful opportunities." }
    ];

    var related = allRows
      .filter(function (candidate) {
        return normalizeIndustry(candidate[1]).toLowerCase() === industryLower &&
          slugify(candidate[0]) !== slugify(name);
      })
      .slice(0, 6);

    return {
      name: name,
      industry: industry,
      image: image,
      slug: slugify(name),
      title: name + " " + industry + " Website Design Case Study",
      category: industry + " Website Design",
      summary: choose(openingStyles, seed, 0) + " This case study reviews the website design, SEO foundation, marketing opportunities, and conversion strategy created around the " + name + " brand.",
      overview: choose(openingStyles, seed, 1),
      industryStrategy: "Successful " + industryLower + " websites depend on " + profile.priority + ". The " + name + " page structure is organized around those expectations so the content feels relevant to the business rather than generic.",
      designStrategy: choose(designStyles, seed, 2),
      seoStrategy: choose(seoStyles, seed, 3),
      marketingStrategy: choose(marketingStyles, seed, 4),
      resultsFocus: choose(resultStyles, seed, 5),
      strategyCards: strategyCards,
      seoCards: seoCards,
      marketingCards: marketingCards,
      resultCards: resultCards,
      services: profile.services,
      related: related,
      action: profile.action
    };
  }

  function renderCards(cards, className, numbered) {
    return cards.map(function (card, index) {
      return '<article class="' + className + '">' +
        (numbered ? '<span>' + String(index + 1).padStart(2, "0") + '</span>' : '') +
        '<h3>' + escapeHtml(card.title) + '</h3>' +
        '<p>' + escapeHtml(card.text) + '</p>' +
      '</article>';
    }).join("");
  }

  var rows = Array.isArray(window.webactPortfolioRows)
    ? window.webactPortfolioRows
    : [];

  var slug = new URLSearchParams(window.location.search).get("project") || "";

  if (!rows.length) {
    document.getElementById("case-title").textContent = "Portfolio projects could not be loaded";
    document.getElementById("case-summary").textContent = "The portfolio data file did not load.";
    return;
  }

  var row = rows.find(function (candidate) {
    return slugify(candidate[0]) === slug;
  });

  if (!row) {
    document.getElementById("case-title").textContent = "Portfolio project not found";
    document.getElementById("case-summary").textContent = "Return to the portfolio and select an available project.";
    document.getElementById("case-image").style.display = "none";
    return;
  }

  var c = buildContent(row, rows);
  var canonical = "https://www.webact.com/about/portfolio/case-study.html?project=" + encodeURIComponent(c.slug);

  document.title = c.title + " | WebAct";
  document.querySelector('meta[name="description"]').content = c.summary;
  document.getElementById("case-category").textContent = c.category;
  document.getElementById("case-title").textContent = c.title;
  document.getElementById("case-summary").textContent = c.summary;
  document.getElementById("case-image").src = c.image;
  document.getElementById("case-image").alt = c.name + " " + c.industry + " website design case study";

  var canonicalTag = document.querySelector('link[rel="canonical"]');
  if (canonicalTag) canonicalTag.href = canonical;

  [
    ['meta[property="og:title"]', c.title + " | WebAct"],
    ['meta[property="og:description"]', c.summary],
    ['meta[property="og:url"]', canonical],
    ['meta[name="twitter:title"]', c.title + " | WebAct"],
    ['meta[name="twitter:description"]', c.summary]
  ].forEach(function (item) {
    var tag = document.querySelector(item[0]);
    if (tag) tag.content = item[1];
  });

  document.getElementById("case-sections").innerHTML =
    '<section class="case-section alt">' +
      '<div class="case-overview-grid">' +
        '<div class="case-copy">' +
          '<p class="eyebrow">Project Overview</p>' +
          '<h2>A focused digital presence for ' + escapeHtml(c.name) + '.</h2>' +
          '<p>' + escapeHtml(c.overview) + '</p><br>' +
          '<p>' + escapeHtml(c.industryStrategy) + '</p>' +
        '</div>' +
        '<aside class="case-summary-card">' +
          '<h3>' + escapeHtml(c.name) + ' Project Snapshot</h3>' +
          '<dl>' +
            '<div><dt>Business</dt><dd>' + escapeHtml(c.name) + '</dd></div>' +
            '<div><dt>Industry</dt><dd>' + escapeHtml(c.industry) + '</dd></div>' +
            '<div><dt>Primary Focus</dt><dd>' + escapeHtml(c.industry) + ' Website Growth</dd></div>' +
            '<div><dt>Customer Action</dt><dd>' + escapeHtml(c.action.charAt(0).toUpperCase() + c.action.slice(1)) + '</dd></div>' +
          '</dl>' +
        '</aside>' +
      '</div>' +
    '</section>' +

    '<section class="case-section">' +
      '<div class="case-copy">' +
        '<p class="eyebrow">' + escapeHtml(c.name) + ' Website Strategy</p>' +
        '<h2>Designed for the way ' + escapeHtml(c.industry.toLowerCase()) + ' customers research and respond.</h2>' +
        '<p>' + escapeHtml(c.designStrategy) + '</p>' +
      '</div>' +
      '<div class="strategy-grid">' + renderCards(c.strategyCards, "strategy-card", true) + '</div>' +
    '</section>' +

    '<section class="case-section dark-strategy">' +
      '<div class="case-copy">' +
        '<p class="eyebrow">' + escapeHtml(c.name) + ' SEO Strategy</p>' +
        '<h2>Search visibility built around ' + escapeHtml(c.name) + ' and the ' + escapeHtml(c.industry.toLowerCase()) + ' market.</h2>' +
        '<p>' + escapeHtml(c.seoStrategy) + '</p>' +
      '</div>' +
      '<div class="seo-grid">' + renderCards(c.seoCards, "seo-card", false) + '</div>' +
    '</section>' +

    '<section class="case-section alt">' +
      '<div class="case-copy">' +
        '<p class="eyebrow">' + escapeHtml(c.name) + ' Marketing Opportunities</p>' +
        '<h2>A website foundation that can support targeted growth.</h2>' +
        '<p>' + escapeHtml(c.marketingStrategy) + '</p>' +
      '</div>' +
      '<div class="marketing-grid">' + renderCards(c.marketingCards, "marketing-card", false) + '</div>' +
    '</section>' +

    '<section class="case-section">' +
      '<div class="case-copy">' +
        '<p class="eyebrow">' + escapeHtml(c.name) + ' Results Focus</p>' +
        '<h2>A clearer, more credible experience for prospective customers.</h2>' +
        '<p>' + escapeHtml(c.resultsFocus) + '</p>' +
      '</div>' +
      '<div class="results-grid">' + renderCards(c.resultCards, "result-card", false) + '</div>' +
    '</section>';

  document.getElementById("services-title").textContent =
    c.name + " website and marketing services.";

  document.getElementById("services-intro").textContent =
    "These services are specifically relevant to the goals, audience, and growth opportunities of a " +
    c.industry.toLowerCase() + " business such as " + c.name + ".";

  document.getElementById("service-grid").outerHTML =
    '<div class="services-pill-grid" id="service-grid">' +
      c.services.map(function (service) {
        return "<span>&check; " + escapeHtml(service) + "</span>";
      }).join("") +
    "</div>";

  document.getElementById("related-intro").textContent =
    "Explore additional " + c.industry.toLowerCase() +
    " website projects and compare how each business is presented for its own audience.";

  document.getElementById("related-grid").innerHTML =
    c.related.map(function (related) {
      return '<a class="related-card" href="/about/portfolio/case-study.html?project=' +
        slugify(related[0]) + '">' +
        '<img src="' + escapeHtml(related[2]) + '" alt="' +
        escapeHtml(related[0]) + ' ' + escapeHtml(related[1]) +
        ' website design" loading="lazy">' +
        '<span>' + escapeHtml(related[1]) + '</span>' +
        '<h3>' + escapeHtml(related[0]) + '</h3>' +
      '</a>';
    }).join("");

  document.getElementById("cta-title").textContent =
    "Need a " + c.industry.toLowerCase() + " website built for your business?";

  document.getElementById("cta-text").textContent =
    "WebAct can create a strategy tailored to your business name, services, customers, market, and growth goals—just as this case study is tailored to " +
    c.name + ".";
})();
</script>
<script src="/script.js?v=main-layout-1"></script>
<script src="/assets/js/routes.js?v=main-layout-1"></script>
<script src="/assets/js/navigation.js?v=main-layout-1"></script>
<script src="/assets/js/includes.js?v=main-layout-1"></script>

</body>
