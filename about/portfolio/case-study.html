<script id="webact-case-study-renderer">
(function () {
  "use strict";

  var rows = Array.isArray(window.webactPortfolioRows)
    ? window.webactPortfolioRows
    : [];
  var engine = window.webactPortfolioContentEngine;
  var slug = new URLSearchParams(window.location.search).get("project") || "";

  if (!rows.length || !engine) {
    console.error("Case-study data or content engine did not load.");
    return;
  }

  var row = rows.find(function (candidate) {
    return engine.slugify(candidate[0]) === slug;
  });

  if (!row) {
    document.getElementById("case-title").textContent =
      "Portfolio project not found";
    document.getElementById("case-summary").textContent =
      "Return to the portfolio and choose an available case study.";
    document.getElementById("case-image").style.display = "none";
    return;
  }

  var c = engine.generate(row, rows);
  var canonical =
    "https://www.webact.com/about/portfolio/case-study.html?project=" +
    encodeURIComponent(c.slug);

  document.title = c.title + " | WebAct";
  document.getElementById("case-category").textContent = c.category;
  document.getElementById("case-title").textContent = c.title;
  document.getElementById("case-summary").textContent = c.summary;
  document.getElementById("case-image").src = c.image;
  document.getElementById("case-image").alt =
    c.name + " website design case study";

  var canonicalTag = document.querySelector('link[rel="canonical"]');
  if (canonicalTag) canonicalTag.href = canonical;

  var ogTitle = document.querySelector('meta[property="og:title"]');
  var ogDescription = document.querySelector('meta[property="og:description"]');
  var ogUrl = document.querySelector('meta[property="og:url"]');

  if (ogTitle) ogTitle.content = c.title + " | WebAct";
  if (ogDescription) ogDescription.content = c.summary;
  if (ogUrl) ogUrl.content = canonical;

  var sections = document.getElementById("case-sections");
  sections.innerHTML =
    '<section class="case-section alt">' +
      '<div class="case-overview-grid">' +
        '<div class="case-copy">' +
          '<p class="eyebrow">Project Overview</p>' +
          '<h2>A clearer digital presence for ' + c.name + '.</h2>' +
          '<p>' + c.overview + '</p>' +
          '<br><p>' + c.industryStrategy + '</p>' +
        '</div>' +
        '<aside class="case-summary-card">' +
          '<h3>Project Snapshot</h3>' +
          '<dl>' +
            '<div><dt>Business</dt><dd>' + c.name + '</dd></div>' +
            '<div><dt>Industry</dt><dd>' + c.industry + '</dd></div>' +
            '<div><dt>Primary Focus</dt><dd>Website Design and Digital Presence</dd></div>' +
            '<div><dt>Experience</dt><dd>Desktop, Tablet, and Mobile</dd></div>' +
          '</dl>' +
        '</aside>' +
      '</div>' +
    '</section>' +
    '<section class="case-section">' +
      '<div class="case-copy">' +
        '<p class="eyebrow">Website Strategy</p>' +
        '<h2>Designed around clarity, trust, and customer action.</h2>' +
        '<p>' + c.designStrategy + '</p>' +
      '</div>' +
    '</section>' +
    '<section class="case-section dark-strategy">' +
      '<div class="case-copy">' +
        '<p class="eyebrow">SEO Strategy</p>' +
        '<h2>Search-friendly structure for long-term visibility.</h2>' +
        '<p>' + c.seoStrategy + '</p>' +
      '</div>' +
    '</section>' +
    '<section class="case-section">' +
      '<div class="case-copy">' +
        '<p class="eyebrow">Marketing Support</p>' +
        '<h2>Services that complement this website.</h2>' +
        '<p>' + c.marketingStrategy + '</p>' +
      '</div>' +
      '<div class="services-pill-grid">' +
        c.services.map(function (service) {
          return '<span>' + service + '</span>';
        }).join("") +
      '</div>' +
    '</section>' +
    '<section class="case-section alt">' +
      '<div class="results-grid">' +
        '<article class="result-card"><h3>Mobile Experience</h3><p>' + c.mobileStrategy + '</p></article>' +
        '<article class="result-card"><h3>Content Clarity</h3><p>' + c.industryStrategy + '</p></article>' +
        '<article class="result-card"><h3>Results Focus</h3><p>' + c.resultsFocus + '</p></article>' +
      '</div>' +
    '</section>';

  var serviceGrid = document.getElementById("service-grid");
  serviceGrid.innerHTML = c.services
    .slice(0, 6)
    .map(function (service) {
      return '<article class="service-card"><h3>' + service + '</h3></article>';
    })
    .join("");

  document.getElementById("services-title").textContent =
    "Services that support " + c.name + ".";
  document.getElementById("services-intro").textContent =
    "A coordinated mix of design, search, content, and marketing services can strengthen this type of project.";

  var relatedGrid = document.getElementById("related-grid");
  relatedGrid.innerHTML = c.related
    .map(function (related) {
      var relatedSlug = engine.slugify(related[0]);
      return (
        '<a class="related-card" href="/about/portfolio/case-study.html?project=' +
        relatedSlug +
        '">' +
          '<img src="' + related[2] + '" alt="' + related[0] + ' website design" loading="lazy">' +
          '<span>' + related[1] + '</span>' +
          '<h3>' + related[0] + '</h3>' +
        '</a>'
      );
    })
    .join("");

  document.getElementById("related-intro").textContent =
    "Explore more WebAct projects in the " + c.industry + " category.";
  document.getElementById("cta-title").textContent =
    "Need a website like " + c.name + "?";
  document.getElementById("cta-text").textContent =
    "WebAct can help create a professional, mobile-friendly website with clear content, search structure, and stronger customer paths.";
})();
</script>
