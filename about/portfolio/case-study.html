<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>WebAct Portfolio Case Study</title>
<meta name="description" content="WebAct website design portfolio case study.">
<link rel="stylesheet" href="../../styles.css?v=reviews-layout-fix"><link rel="stylesheet" href="../../assets/css/webact-promodo-nav.css"><link rel="stylesheet" href="./portfolio-premium.css">
<style>
:root{--blue:#27a8e0;--ink:#071927;--muted:#5d6c78;--line:#dce7ee;--soft:#f4f9fc}*{box-sizing:border-box}body{margin:0;background:#fff;color:var(--ink);font-family:Inter,Arial,Helvetica,sans-serif}.case-hero{background:linear-gradient(180deg,#eef8fd 0%,#fff 100%);border-bottom:1px solid var(--line)}.case-wrap{max-width:1180px;margin:0 auto;padding:0 22px}.case-hero .case-wrap{padding-top:72px;padding-bottom:54px;display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,.9fr);gap:42px;align-items:center}.eyebrow{margin:0 0 14px;color:var(--blue);font-weight:900;text-transform:uppercase;font-size:13px;letter-spacing:.08em}.case-hero h1{margin:0;font-size:clamp(42px,7vw,78px);line-height:.98}.case-hero p{margin:18px 0 0;color:var(--muted);font-size:20px;line-height:1.55}.case-section{padding:64px 0}.case-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}.case-card{border:1px solid var(--line);border-radius:12px;background:#fff;padding:26px;box-shadow:0 12px 34px rgba(5,25,39,.06)}.case-card h2,.case-card h3{margin:0 0 14px}.case-card p,.case-card li{color:var(--muted);line-height:1.65}.tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}.tags span{border-radius:999px;background:#e7f6fc;color:#148fc4;font-size:12px;font-weight:900;text-transform:uppercase;padding:8px 11px}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:12px 18px;border-radius:8px;background:#071927;color:#fff;font-weight:900;text-decoration:none}.btn.secondary{background:#27a8e0;color:#071927}.not-found{padding:80px 22px;text-align:center}.site-footer{border-top:1px solid var(--line);background:#071927;color:#fff;padding:32px 22px;text-align:center}.site-footer img{max-width:170px}.footer-links{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin-top:18px;font-weight:900}@media(max-width:860px){.case-hero .case-wrap,.case-grid{grid-template-columns:1fr}.case-section{padding:44px 0}}
</style>
</head>
<body>
<header class="wa-promodo-header" data-wa-nav><nav class="wa-promodo-nav" aria-label="Main navigation"><a class="wa-promodo-logo" href="../../index.html" aria-label="WebAct home"><img src="../../assets/images/webact-logo.png" alt="WebAct"></a><ul class="wa-promodo-menu" data-wa-menu><li class="wa-promodo-item"><a class="wa-promodo-direct" href="../../index.html">Home</a></li><li class="wa-promodo-item"><a class="wa-promodo-direct" href="../../design/website-design/index.html">Website Design</a></li><li class="wa-promodo-item"><a class="wa-promodo-direct" href="../../digital-ads/index.html">Digital Ads</a></li><li class="wa-promodo-item"><a class="wa-promodo-direct" href="../../marketing/index.html">Marketing</a></li><li class="wa-promodo-item"><a class="wa-promodo-direct" href="../../contact/index.html">Contact Us</a></li></ul><div class="wa-promodo-actions"><a class="wa-promodo-cta" href="../../contact/index.html">Get Started</a><button class="wa-promodo-toggle" type="button" aria-label="Open navigation" aria-expanded="false" data-wa-menu-toggle><span></span></button></div></nav></header>
<main id="case-root"><div class="not-found">Loading case study...</div></main>
<footer class="site-footer"><img src="../../assets/logo.png" alt="WebAct"><p>Website design, advertising, marketing, widgets, domains, and email for small and medium-sized businesses.</p><div class="footer-links"><a href="../../design/index.html">Design</a><a href="../../digital-ads/index.html">Digital Ads</a><a href="../../marketing/index.html">Marketing</a><a href="../../pricing/index.html">Pricing</a></div></footer>
<script src="../../script.js?v=reviews-layout-fix"></script><script src="../../assets/js/webact-promodo-nav.js" defer></script><script src="./portfolio-data.js"></script><script src="./portfolio-data-all.js"></script>
<script>
const slug=s=>s.toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
const svc=i=>['Restaurant','Pet Services','Home Care','Healthcare','Driving School','HVAC','Plumbing','Pest Control','Locksmith','Roofing','Salon & Beauty','Automotive'].includes(i)?['Website Design',i,'Local SEO']:['Website Design','Content','Lead Generation'];
const rows=window.webactPortfolioRows||[];
const fallback=window.webactPortfolioProjects||[];
const projects=rows.length?rows.map(r=>({name:r[0],industry:r[1],img:r[2],url:r[3],services:svc(r[1]),desc:r[1]+' website design case study for '+r[0]+', focused on clear messaging, professional presentation, visitor trust, and customer inquiry paths.'})):fallback;
const params=new URLSearchParams(location.search);
const key=params.get('project')||'';
const project=projects.find(p=>slug(p.name)===key)||projects[0];
const root=document.getElementById('case-root');
if(!project){root.innerHTML='<div class="not-found"><h1>Case study not found</h1><p><a href="./index.html">Back to portfolio</a></p></div>';}else{
document.title=project.name+' Case Study | WebAct Portfolio';
document.querySelector('meta[name="description"]').setAttribute('content',project.desc);
const tags=(project.services||[]).map(s=>'<span>'+s+'</span>').join('');
const related=projects.filter(p=>p.industry===project.industry&&p.name!==project.name).slice(0,3).map(p=>'<a class="related-card" href="./case-study.html?project='+slug(p.name)+'"><small>'+p.industry+'</small><strong>'+p.name+'</strong></a>').join('');
const previewButton=project.url?'<a class="btn preview-link" href="'+project.url+'" target="_blank" rel="noopener">View Website Preview</a>':'';
root.innerHTML='<section class="case-hero"><div class="case-wrap"><div><p class="eyebrow">'+project.industry+' Case Study</p><h1>'+project.name+'</h1><p>'+project.desc+'</p><div class="tags">'+tags+'</div><div class="actions"><a class="btn" href="../../contact/index.html">Start a Similar Project</a>'+previewButton+'<a class="btn secondary" href="./index.html">Back to Portfolio</a></div><div class="case-stat-grid"><div class="case-stat"><b>Industry</b><span>'+project.industry+'</span></div><div class="case-stat"><b>Website Type</b><span>Business Website</span></div><div class="case-stat"><b>Design</b><span>Responsive Layout</span></div><div class="case-stat"><b>Goal</b><span>Lead Generation</span></div></div></div><div class="case-browser-frame"><div class="browser-bar"><i class="browser-dot"></i><i class="browser-dot"></i><i class="browser-dot"></i><span class="browser-url">webact preview</span></div><div class="case-image"><img src="'+project.img+'" alt="'+project.name+' website screenshot"></div></div></div></section><section class="case-section"><div class="case-wrap case-grid"><article class="case-card"><h2>Project Overview</h2><p>This WebAct project highlights a website design built for '+project.name+' in the '+project.industry+' industry. The goal was to create a professional, trustworthy, and easy-to-navigate online presence that helps visitors understand the business and take the next step.</p></article><article class="case-card"><h2>Services Featured</h2><div class="tags">'+tags+'</div><p>Each portfolio project connects website design with the marketing foundation needed for visibility, credibility, and customer inquiries.</p></article><article class="case-card"><h3>Design Focus</h3><ul><li>Consistent branded presentation</li><li>Industry-relevant messaging</li><li>Mobile-friendly structure</li><li>Simple navigation and contact paths</li></ul></article><article class="case-card"><h3>Related WebAct Support</h3><ul><li>Website design and layout</li><li>Service page structure</li><li>Local search support</li><li>Conversion-focused calls to action</li></ul></article></div></section><section class="case-section" style="padding-top:0"><div class="case-wrap"><h2>Related '+project.industry+' Projects</h2><div class="related-grid">'+(related||'<p>No related projects available yet.</p>')+'</div></div></section>';
}
</script><script src="./portfolio-image-fallback.js"></script>
</body>
</html>
